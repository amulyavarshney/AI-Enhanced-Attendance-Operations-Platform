version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/attendance_db
      - APP_ENV=${APP_ENV:-development}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev_reset_key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-only-change-me-in-production}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-480}
      - AI_RATE_LIMIT_MAX=${AI_RATE_LIMIT_MAX:-20}
      - AI_RATE_LIMIT_WINDOW_SECONDS=${AI_RATE_LIMIT_WINDOW_SECONDS:-60}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_MODEL=${AZURE_OPENAI_MODEL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - attendance-network
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: attendance-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - attendance-network

  db:
    image: postgres:15-alpine
    container_name: attendance-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge

volumes:
  postgres_data:
